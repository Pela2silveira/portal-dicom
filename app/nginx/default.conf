map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $forwarded_host {
    default $http_x_forwarded_host;
    "" $http_host;
}

# #region agent log
# Temporary verbose access log to debug Stone /rendered 400 regression.
# Captures: client IP chain, original method/URI/protocol/query, the URI nginx
# would forward to the upstream (which is exactly $request_uri after our fix),
# and the upstream response code so we can pinpoint which proxy hop loses the
# query string. Remove once the rendering regression is confirmed fixed.
log_format dbg_orthanc '$time_iso8601 '
                       'remote=$remote_addr xff="$http_x_forwarded_for" '
                       'method=$request_method proto=$server_protocol '
                       'uri=$uri args="$args" is_args="$is_args" '
                       'request_uri="$request_uri" '
                       'request_line="$request" '
                       'referer="$http_referer" '
                       'status=$status bytes_sent=$body_bytes_sent '
                       'upstream_addr=$upstream_addr '
                       'upstream_status=$upstream_status '
                       'upstream_response_time=$upstream_response_time '
                       'upstream_bytes_received=$upstream_bytes_received';
# #endregion

server {
    listen 80;
    server_name _;
    # Resolve Docker service names periodically to avoid stale container IPs after redeploy.
    # IMPORTANT: when using variables in proxy_pass, nginx URI handling changes.
    # - Literal `proxy_pass http://upstream;` forwards the full $request_uri (path + query).
    # - Variable `proxy_pass $upstream;` forwards only $uri and drops the query string.
    # For upstreams reached via $variable always append $request_uri so query parameters
    # (e.g. /rendered?viewport=128,128) survive; otherwise the upstream may reject the call.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_origin http://backend:8082;
    set $ohif_origin http://ohif;
    set $orthanc_origin http://orthanc:8042;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options SAMEORIGIN always;

    error_page 502 503 504 =503 /maintenance.html;

    location = /maintenance.html {
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store" always;
    }

    location = /__backend_health {
        internal;
        proxy_pass $backend_origin/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Portal-Internal-Health 1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;
        proxy_intercept_errors on;
    }

    location = / {
        auth_request /__backend_health;
        error_page 401 403 500 502 503 504 =503 /maintenance.html;
        try_files /index.html =404;
    }

    location = /favicon.ico {
        try_files /favicon.ico =404;
    }

    location = /api/config {
        return 403;
    }

    location /api/ {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /viewer-access/ {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /share {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/retrieve/jobs/.+/events$ {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_buffering off;
        proxy_cache off;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        add_header X-Accel-Buffering no;
    }

    location = /api/patient/download {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 5s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location = /api/physician/download {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 5s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location = /api/system/events {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_buffering off;
        proxy_cache off;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        add_header X-Accel-Buffering no;
    }

    location = /ohif {
        return 302 /;
    }

    location = /ohif/ {
        return 302 /;
    }

    location /ohif/ {
        proxy_pass $ohif_origin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ohif;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /app-config.js {
        proxy_pass $ohif_origin/app-config.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /init-service-worker.js {
        proxy_pass $ohif_origin/init-service-worker.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /third_party/ {
        proxy_pass $ohif_origin/third_party/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ^~ /portal-assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location ~* ^/(assets/.*|.*\.(css|js|map|png|svg|ico|json|woff2?))$ {
        proxy_pass $ohif_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /dicomweb {
        return 301 /dicomweb/;
    }

    location /dicomweb/ {
        # #region agent log
        access_log /var/log/nginx/dbg_orthanc.log dbg_orthanc;
        add_header X-Debug-Loc "/dicomweb/" always;
        add_header X-Debug-Upstream-Status $upstream_status always;
        # #endregion
        rewrite ^/dicomweb/(.*)$ /dicom-web/$1 break;
        proxy_pass $orthanc_origin$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /dicom-web {
        return 301 /dicom-web/;
    }

    location /dicom-web/ {
        # #region agent log
        access_log /var/log/nginx/dbg_orthanc.log dbg_orthanc;
        add_header X-Debug-Loc "/dicom-web/" always;
        add_header X-Debug-Upstream-Status $upstream_status always;
        # #endregion
        proxy_pass $orthanc_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ^~ /stone-webviewer/ {
        # Keep full original URI (/stone-webviewer/index.html?...).
        # Variable upstream drops the query string when no URI suffix is given,
        # so append $request_uri to forward path + query verbatim.
        # #region agent log
        access_log /var/log/nginx/dbg_orthanc.log dbg_orthanc;
        add_header X-Debug-Loc "/stone-webviewer/" always;
        add_header X-Debug-Upstream-Status $upstream_status always;
        # #endregion
        # Stone is built by emscripten: app.js and StoneWebViewer.wasm must
        # always come from the SAME build, otherwise EM_ASM offsets mismatch
        # and Stone aborts before rendering. Force revalidation so a browser
        # never serves a stale JS paired with a fresh WASM (or vice versa)
        # after the Orthanc image is upgraded.
        add_header Cache-Control "no-cache, must-revalidate" always;
        proxy_pass $orthanc_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/(instances|patients|series|studies|tools)/ {
        # #region agent log
        access_log /var/log/nginx/dbg_orthanc.log dbg_orthanc;
        add_header X-Debug-Loc "/orthanc-rest/" always;
        add_header X-Debug-Upstream-Status $upstream_status always;
        # #endregion
        proxy_pass $orthanc_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/(app|changes|exports|jobs|modalities|peers|plugins|statistics|system)/ {
        return 403;
    }

    location / {
        auth_request /__backend_health;
        error_page 401 403 500 502 503 504 =503 /maintenance.html;
        try_files $uri $uri/ /index.html;
    }
}
