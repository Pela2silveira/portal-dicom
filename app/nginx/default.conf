map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $forwarded_host {
    default $http_x_forwarded_host;
    "" $http_host;
}

server {
    listen 80;
    server_name _;
    # Resolve Docker service names periodically to avoid stale container IPs after redeploy.
    # IMPORTANT: when using variables in proxy_pass, nginx URI handling changes.
    # Be careful with trailing slashes because they can rewrite/drop path segments.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_origin http://backend:8082;
    set $ohif_origin http://ohif;
    set $orthanc_origin http://orthanc:8042;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options SAMEORIGIN always;

    error_page 502 503 504 =503 /maintenance.html;

    location = /maintenance.html {
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store" always;
    }

    location = /__backend_health {
        internal;
        proxy_pass $backend_origin/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Portal-Internal-Health 1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;
        proxy_intercept_errors on;
    }

    location = / {
        auth_request /__backend_health;
        error_page 401 403 500 502 503 504 =503 /maintenance.html;
        try_files /index.html =404;
    }

    location = /favicon.ico {
        try_files /favicon.ico =404;
    }

    location = /api/config {
        return 403;
    }

    location /api/ {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /viewer-access/ {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /share {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/retrieve/jobs/.+/events$ {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_buffering off;
        proxy_cache off;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        add_header X-Accel-Buffering no;
    }

    location = /api/patient/download {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 5s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location = /api/physician/download {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 5s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location = /api/system/events {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_buffering off;
        proxy_cache off;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        add_header X-Accel-Buffering no;
    }

    location = /ohif {
        return 302 /;
    }

    location = /ohif/ {
        return 302 /;
    }

    location /ohif/ {
        proxy_pass $ohif_origin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ohif;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /app-config.js {
        proxy_pass $ohif_origin/app-config.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /init-service-worker.js {
        proxy_pass $ohif_origin/init-service-worker.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /third_party/ {
        proxy_pass $ohif_origin/third_party/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ^~ /portal-assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location ~* ^/(assets/.*|.*\.(css|js|map|png|svg|ico|json|woff2?))$ {
        proxy_pass $ohif_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /dicomweb {
        return 301 /dicomweb/;
    }

    location /dicomweb/ {
        rewrite ^/dicomweb/(.*)$ /dicom-web/$1 break;
        proxy_pass $orthanc_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /dicom-web {
        return 301 /dicom-web/;
    }

    location /dicom-web/ {
        proxy_pass $orthanc_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ^~ /stone-webviewer/ {
        # Keep full original URI (/stone-webviewer/index.html?...).
        # Do NOT append /stone-webviewer/ in proxy_pass with variable upstream,
        # otherwise nginx may normalize to the wrong upstream path and return 404.
        proxy_pass $orthanc_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/(instances|patients|series|studies|tools)/ {
        proxy_pass $orthanc_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/(app|changes|exports|jobs|modalities|peers|plugins|statistics|system)/ {
        return 403;
    }

    location / {
        auth_request /__backend_health;
        error_page 401 403 500 502 503 504 =503 /maintenance.html;
        try_files $uri $uri/ /index.html;
    }
}
