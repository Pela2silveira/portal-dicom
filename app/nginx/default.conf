server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options SAMEORIGIN always;

    error_page 502 503 504 =503 /maintenance.html;

    location = /maintenance.html {
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store" always;
    }

    location = /__backend_health {
        internal;
        proxy_pass http://backend:8081/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;
        proxy_intercept_errors on;
    }

    location = / {
        auth_request /__backend_health;
        error_page 401 403 500 502 503 504 =503 /maintenance.html;
        try_files /index.html =404;
    }

    location = /favicon.ico {
        try_files /favicon.ico =404;
    }

    location /api/ {
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location ~ ^/api/retrieve/jobs/.+/events$ {
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_buffering off;
        proxy_cache off;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        add_header X-Accel-Buffering no;
    }

    location = /ohif {
        return 302 /;
    }

    location = /ohif/ {
        return 302 /;
    }

    location /ohif/ {
        proxy_pass http://ohif/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ohif;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /app-config.js {
        proxy_pass http://ohif/app-config.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /init-service-worker.js {
        proxy_pass http://ohif/init-service-worker.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /third_party/ {
        proxy_pass http://ohif/third_party/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ^~ /portal-assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location ~* ^/(assets/.*|.*\.(css|js|map|png|svg|ico|json|woff2?))$ {
        proxy_pass http://ohif;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /dicomweb {
        return 301 /dicomweb/;
    }

    location /dicomweb/ {
        rewrite ^/dicomweb/(.*)$ /dicom-web/$1 break;
        proxy_pass http://orthanc:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /dicom-web {
        return 301 /dicom-web/;
    }

    location /dicom-web/ {
        proxy_pass http://orthanc:8042;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/(app|changes|exports|instances|jobs|modalities|patients|peers|plugins|series|statistics|studies|system|tools)/ {
        return 403;
    }

    location / {
        auth_request /__backend_health;
        error_page 401 403 500 502 503 504 =503 /maintenance.html;
        try_files $uri $uri/ /index.html;
    }
}
