<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal en mantenimiento</title>
    <style>
      :root {
        --bg: #f4f7f8;
        --surface: #ffffff;
        --text: #17343b;
        --muted: #56727a;
        --line: #d8e2e5;
        --accent: #00a8e0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(0, 168, 224, 0.12), transparent 32%),
          linear-gradient(180deg, #f8fbfc 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Segoe UI", sans-serif;
      }

      .maintenance-card {
        width: min(100%, 720px);
        padding: 40px 32px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: 0 20px 60px rgba(16, 46, 53, 0.08);
      }

      .artwork {
        margin: 0 0 28px;
        padding: 16px;
        border: 1px solid var(--line);
        background:
          radial-gradient(circle at 20% 18%, rgba(0, 168, 224, 0.1), transparent 30%),
          linear-gradient(180deg, #fbfdfd 0%, #f2f7f8 100%);
      }

      .artwork svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 5vw, 3.1rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
      }

      .contact {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
        font-weight: 600;
        color: var(--text);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>

      <h1>La app esta en mantenimiento.</h1>
      <p>Sepan disculpar las molestias.</p>
      <p class="contact">Contacto: <a href="mailto:info@andes.gob.ar">info@andes.gob.ar</a></p>

</html>
